name: Build GitHub Pages
on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
#      - 'doc/mkdocs/**'
      - 'mkdocs.yml'
      - 'docs/**'
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
      - run: pip install \
            mkdocs-material
      - run: mkdocs gh-deploy --config-file doc/mkdocs/mkdocs.yml --force    

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: gh-pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      